services:
  nginx:
    image: nginx:latest
    container_name: win-nginx
    ports:
      - "80:80"
    volumes:
      # Nginx server config
      - /Users/cheng/web/conf/config/nginxwin/local.conf:/etc/nginx/conf.d/default.conf:ro
      # Local videos -> container path used by alias /web/vid/
      - /Users/cheng/web/x:/web/vid:ro
    restart: unless-stopped
