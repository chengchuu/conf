# The default server
server {
    listen 80 default_server;
    # listen [::]:80 default_server;
    server_name _;
    root /web/x/base;
    index index.html;

    location / {
    }

    error_page 400 401 403 404 405 408 429 /40x.html;
    location = /40x.html {
        internal;
    }

    error_page 500 502 503 504 /50x.html;
    location = /50x.html {
        internal;
    }
}
