server {
    listen 80;
    server_name vid.local;

    # Optional: logs
    access_log /var/log/nginx/video_access.log;
    error_log  /var/log/nginx/video_error.log warn;

    # Your video root directory on disk
    # Example file: /web/vid/movie/demo.mp4 -> URL: /vid/movie/demo.mp4
    location /vid/ {
        alias /web/vid/;

        # Enable byte-range requests (seek/scrub in players)
        mp4;
        mp4_buffer_size       1m;
        mp4_max_buffer_size   5m;

        # Correct MIME fallback
        types {
            video/mp4  mp4;
            video/webm webm;
            video/ogg  ogv;
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # Caching headers
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;

        # CORS (useful for web players / other domains)
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

        # OPTIONS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # Optional anti-hotlinking (comment out if not needed)
        # valid_referers none blocked vid.local *.vid.local;
        # if ($invalid_referer) { return 403; }

        # Only serve existing files
        try_files $uri =404;
    }

    # Optional: block everything else
    location / {
        return 404;
    }
}
