server {
    listen 80;
    server_name vid.local;

    access_log /var/log/nginx/video_access.log;
    error_log  /var/log/nginx/video_error.log warn;

    location /vid/ {
        alias /web/vid/;

        # Large-file friendly
        sendfile on;
        tcp_nopush on;
        aio on;                 # use 'aio threads;' on newer Linux builds if supported
        directio 8m;            # reduce page cache pollution for big files
        output_buffers 1 512k;

        # Keep range/seek support
        mp4;
        mp4_buffer_size 512k;
        mp4_max_buffer_size 10m;

        types {
            video/mp4  mp4;
            video/webm webm;
            video/ogg  ogv;
            application/vnd.apple.mpegurl m3u8;
            video/mp2t ts;
        }

        # Optional: avoid gzip for video
        gzip off;

        # Caching
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable" always;
        add_header Accept-Ranges "bytes" always;

        # CORS
        add_header Access-Control-Allow-Origin "*" always;
        add_header Access-Control-Allow-Methods "GET, HEAD, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Range" always;
        add_header Access-Control-Expose-Headers "Content-Length,Content-Range" always;

        if ($request_method = OPTIONS) {
            return 204;
        }

        try_files $uri =404;
    }

    location / {
        return 404;
    }
}
